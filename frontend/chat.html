<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Boot — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:    #F5C842;
  --gold2:   #E8A020;
  --dark:    #0D0D0D;
  --dark2:   #141414;
  --surface: #1A1A1A;
  --surface2:#222;
  --border:  #2C2C2C;
  --text:    #F0EDE6;
  --muted:   #777;
  --green:   #4ADE80;
  --red:     #F87171;
  --blue:    #60A5FA;
  --sidebar: 280px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Syne',sans-serif;
  background:var(--dark);
  color:var(--text);
  display:flex;
}

/* ══ SIDEBAR ══════════════════════════════════════════════ */
.sidebar {
  width:var(--sidebar);
  background:var(--dark2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  height:100vh;
}
.sidebar-header {
  padding:1rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:.75rem;
}
.sidebar-logo {
  font-family:'Clash Display',sans-serif;
  font-size:1.15rem;
  color:var(--gold);
  font-weight:700;
}
.sidebar-logo span { font-size:1.4rem; }
.sidebar-tabs {
  display:flex;
  border-bottom:1px solid var(--border);
}
.stab {
  flex:1; padding:.65rem .25rem;
  background:none; border:none;
  color:var(--muted); font-size:1.2rem;
  cursor:pointer; transition:all .2s;
  position:relative;
}
.stab.active { color:var(--gold); }
.stab.active::after {
  content:'';
  position:absolute; bottom:0; left:25%; right:25%;
  height:2px; background:var(--gold); border-radius:2px;
}
.badge {
  position:absolute; top:6px; right:6px;
  background:var(--red); color:#fff;
  border-radius:999px; font-size:.65rem;
  padding:1px 5px; font-weight:700;
  display:none;
}
.badge.show{display:block}

/* ── Lista de chats ── */
.panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
.panel.active { display:flex; }

.search-box {
  padding:.75rem 1rem;
  border-bottom:1px solid var(--border);
}
.search-box input {
  width:100%; background:var(--surface);
  border:1px solid var(--border); border-radius:10px;
  padding:.5rem .75rem; color:var(--text);
  font-family:'Syne',sans-serif; font-size:.85rem; outline:none;
}
.search-box input:focus { border-color:var(--gold); }

.list { overflow-y:auto; flex:1; }
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.list-item {
  display:flex; align-items:center; gap:.75rem;
  padding:.75rem 1rem; cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background .15s;
  position:relative;
}
.list-item:hover { background:var(--surface); }
.list-item.active { background:rgba(245,200,66,.08); border-left:3px solid var(--gold); }

.avatar {
  width:40px; height:40px; border-radius:50%;
  background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; flex-shrink:0; position:relative;
  font-weight:600; color:var(--gold);
  font-family:'Clash Display',sans-serif;
}
.status-dot {
  width:10px;height:10px;border-radius:50%;
  border:2px solid var(--dark2);
  position:absolute;bottom:0;right:0;
}
.online{background:var(--green)}
.offline{background:var(--muted)}
.away{background:var(--gold)}

.list-info { flex:1; min-width:0; }
.list-name  { font-size:.9rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.list-preview { font-size:.78rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:.15rem; }

.btn-add {
  margin:1rem; padding:.6rem; border-radius:12px;
  background:rgba(245,200,66,.12); border:1px dashed rgba(245,200,66,.3);
  color:var(--gold); font-family:'Syne',sans-serif;
  cursor:pointer; font-size:.85rem; transition:all .2s;
}
.btn-add:hover { background:rgba(245,200,66,.2); }

/* ── User info bottom ── */
.sidebar-footer {
  padding:1rem;
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:.75rem;
}
.my-info { flex:1; min-width:0; }
.my-name { font-weight:600; font-size:.9rem; }
.my-points { font-size:.75rem; color:var(--gold); }
.btn-icon {
  background:none; border:none;
  color:var(--muted); cursor:pointer;
  font-size:1.1rem; padding:.25rem;
  transition:color .2s;
}
.btn-icon:hover { color:var(--text); }

/* ══ MAIN AREA ════════════════════════════════════════════ */
.main {
  flex:1; display:flex; flex-direction:column;
  height:100vh; overflow:hidden; position:relative;
}

/* ── Chat header ── */
.chat-header {
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:1rem;
  background:var(--dark2); flex-shrink:0;
}
.chat-title { font-family:'Clash Display',sans-serif; font-size:1.1rem; }
.chat-sub   { font-size:.78rem; color:var(--muted); }
.header-actions { margin-left:auto; display:flex; gap:.5rem; }
.btn-action {
  padding:.45rem .9rem; border-radius:9px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--text); font-family:'Syne',sans-serif;
  font-size:.82rem; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:.4rem;
}
.btn-action:hover { border-color:var(--gold); color:var(--gold); }
.btn-action.danger:hover { border-color:var(--red); color:var(--red); }

/* ── Messages ── */
.messages {
  flex:1; overflow-y:auto; padding:1.25rem 1.5rem;
  display:flex; flex-direction:column; gap:.75rem;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.msg-wrapper { display:flex; gap:.6rem; max-width:70%; }
.msg-wrapper.mine { flex-direction:row-reverse; align-self:flex-end; }
.msg-wrapper.theirs { align-self:flex-start; }

.msg-avatar { width:30px; height:30px; border-radius:50%; font-size:.8rem; flex-shrink:0;
  background:var(--surface2); display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-weight:600; }

.msg-bubble {
  background:var(--surface);
  border-radius:16px; padding:.6rem .9rem;
  font-size:.9rem; line-height:1.5;
  border:1px solid var(--border);
  word-break:break-word;
}
.mine .msg-bubble {
  background:rgba(245,200,66,.15);
  border-color:rgba(245,200,66,.25);
}
.msg-meta { font-size:.7rem; color:var(--muted); margin-top:.3rem; display:flex; gap:.5rem; align-items:center; }
.msg-sender { font-weight:600; font-size:.78rem; color:var(--gold); margin-bottom:.2rem; }
.encrypted-badge { font-size:.65rem; color:var(--muted); }

.msg-file img { max-width:200px; border-radius:10px; cursor:pointer; }
.msg-file audio { width:200px; }
.msg-location a { color:var(--blue); text-decoration:none; }
.msg-location a:hover { text-decoration:underline; }

.typing-indicator { font-size:.8rem; color:var(--muted); padding:.25rem 0; font-style:italic; }

/* ── Input area ── */
.input-area {
  padding:1rem 1.5rem;
  border-top:1px solid var(--border);
  background:var(--dark2); flex-shrink:0;
}
.input-toolbar {
  display:flex; gap:.5rem; margin-bottom:.5rem;
}
.tool-btn {
  background:none; border:none;
  color:var(--muted); cursor:pointer;
  font-size:1.1rem; padding:.25rem;
  transition:color .2s;
}
.tool-btn:hover { color:var(--gold); }

.encrypt-toggle {
  margin-left:auto;
  display:flex; align-items:center; gap:.4rem;
  font-size:.78rem; color:var(--muted);
}
.encrypt-toggle input[type=checkbox] { accent-color:var(--gold); }

.input-row { display:flex; gap:.75rem; align-items:flex-end; }
.msg-input {
  flex:1; background:var(--surface);
  border:1px solid var(--border); border-radius:14px;
  padding:.75rem 1rem; color:var(--text);
  font-family:'Syne',sans-serif; font-size:.95rem;
  outline:none; resize:none; max-height:120px;
  transition:border-color .2s; line-height:1.5;
}
.msg-input:focus { border-color:var(--gold); }
.btn-send {
  width:44px; height:44px; border-radius:12px;
  background:var(--gold); border:none;
  color:var(--dark); font-size:1.1rem;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center;
}
.btn-send:hover { background:var(--gold2); transform:translateY(-1px); }

/* ── Empty state ── */
.empty-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:1rem; color:var(--muted); text-align:center;
}
.empty-state span { font-size:3.5rem; }
.empty-state h2 { font-family:'Clash Display',sans-serif; font-size:1.3rem; color:var(--text); }

/* ══ PANELS (Tareas / Recompensas) ════════════════════════ */
.side-panel {
  width:320px; background:var(--dark2);
  border-left:1px solid var(--border);
  display:none; flex-direction:column;
  height:100vh;
}
.side-panel.open { display:flex; }
.panel-header {
  padding:1rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.panel-title { font-family:'Clash Display',sans-serif; font-size:1rem; }
.panel-body { overflow-y:auto; flex:1; padding:1rem; display:flex; flex-direction:column; gap:.75rem; }
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── Task card ── */
.task-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:.9rem 1rem;
}
.task-title { font-weight:600; font-size:.9rem; margin-bottom:.3rem; }
.task-meta  { font-size:.75rem; color:var(--muted); }
.task-status {
  display:inline-block; margin-top:.4rem;
  padding:.2rem .6rem; border-radius:999px;
  font-size:.72rem; font-weight:600;
}
.status-pending     { background:rgba(245,200,66,.15); color:var(--gold); }
.status-done        { background:rgba(74,222,128,.15);  color:var(--green); }
.status-in_progress { background:rgba(96,165,250,.15);  color:var(--blue); }
.btn-complete {
  margin-top:.6rem; padding:.35rem .75rem;
  border-radius:8px; border:1px solid rgba(74,222,128,.3);
  background:rgba(74,222,128,.1); color:var(--green);
  font-size:.78rem; cursor:pointer; font-family:'Syne',sans-serif;
  transition:all .2s;
}
.btn-complete:hover { background:rgba(74,222,128,.2); }

/* ── Reward card ── */
.reward-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:.75rem 1rem;
  display:flex; align-items:center; gap:.75rem;
}
.reward-icon { font-size:1.8rem; }
.reward-info .reward-name { font-weight:600; font-size:.88rem; }
.reward-info .reward-desc { font-size:.75rem; color:var(--muted); }
.reward-earned { margin-left:auto; font-size:1.2rem; }

/* ── Leaderboard ── */
.leader-row {
  display:flex; align-items:center; gap:.75rem;
  padding:.6rem .75rem; border-radius:12px;
  background:var(--surface); border:1px solid var(--border);
}
.leader-rank { font-family:'Clash Display',sans-serif; font-size:1rem; width:24px; color:var(--muted); }
.leader-rank.gold-rank { color:var(--gold); }
.leader-pts { margin-left:auto; font-size:.85rem; color:var(--gold); font-weight:600; }

/* ══ MODALS ═══════════════════════════════════════════════ */
.modal-overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.7); backdrop-filter:blur(6px);
  display:none; align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:1.75rem; width:90%; max-width:420px;
  max-height:80vh; display:flex; flex-direction:column; gap:1rem;
}
.modal h3 { font-family:'Clash Display',sans-serif; font-size:1.1rem; }
.modal input, .modal textarea, .modal select {
  width:100%; background:var(--dark2);
  border:1px solid var(--border); border-radius:10px;
  padding:.65rem .9rem; color:var(--text);
  font-family:'Syne',sans-serif; font-size:.9rem; outline:none;
}
.modal input:focus,.modal textarea:focus,.modal select:focus { border-color:var(--gold); }
.modal textarea { resize:vertical; min-height:80px; }
.modal-actions { display:flex; gap:.75rem; margin-top:.25rem; }
.btn-modal-ok {
  flex:1; padding:.7rem; border-radius:10px;
  background:var(--gold); border:none; color:var(--dark);
  font-family:'Clash Display',sans-serif; font-weight:600;
  cursor:pointer; font-size:.95rem; transition:all .2s;
}
.btn-modal-ok:hover { background:var(--gold2); }
.btn-modal-cancel {
  flex:1; padding:.7rem; border-radius:10px;
  background:none; border:1px solid var(--border); color:var(--muted);
  font-family:'Syne',sans-serif; cursor:pointer;
  transition:all .2s;
}
.btn-modal-cancel:hover { border-color:var(--text); color:var(--text); }

.users-list-check { overflow-y:auto; max-height:180px; display:flex; flex-direction:column; gap:.4rem; }
.user-check-item {
  display:flex; align-items:center; gap:.6rem;
  padding:.4rem .6rem; border-radius:8px;
  cursor:pointer; transition:background .15s;
}
.user-check-item:hover { background:var(--surface2); }
.user-check-item input[type=checkbox] { accent-color:var(--gold); }

/* ══ VIDEOLLAMADA ════════════════════════════════════════ */
.call-overlay {
  position:fixed; inset:0; z-index:200;
  background:#000; display:none;
  flex-direction:column;
}
.call-overlay.open { display:flex; }
.video-grid {
  flex:1; display:grid;
  grid-template-columns:1fr 1fr; gap:8px; padding:8px;
}
video { width:100%; height:100%; object-fit:cover; border-radius:12px; background:#111; }
#local-video  { grid-column:2; border:2px solid var(--gold); }
#remote-video { grid-column:1; }
.call-controls {
  padding:1.25rem; display:flex; justify-content:center; gap:1rem;
  background:rgba(0,0,0,.6); backdrop-filter:blur(8px);
}
.call-btn {
  width:52px; height:52px; border-radius:50%; border:none;
  font-size:1.3rem; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center;
}
.call-btn:hover { transform:scale(1.1); }
.call-btn.end { background:var(--red); color:#fff; }
.call-btn.mute, .call-btn.cam { background:var(--surface); color:var(--text); }

/* ══ TOAST ═══════════════════════════════════════════════ */
#toast-container {
  position:fixed; top:1.5rem; right:1.5rem;
  z-index:999; display:flex; flex-direction:column; gap:.5rem;
}
.toast {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:.75rem 1.1rem;
  font-size:.88rem; box-shadow:0 8px 24px rgba(0,0,0,.4);
  display:flex; align-items:center; gap:.6rem;
  animation:slideIn .3s ease;
  border-left:3px solid var(--gold);
}
@keyframes slideIn {
  from { transform:translateX(120%); opacity:0; }
  to   { transform:translateX(0);    opacity:1; }
}

/* ══ RESPONSIVE ══════════════════════════════════════════ */
@media(max-width:768px) {
  .sidebar { width:100%; position:fixed; z-index:50; transform:translateX(-100%); transition:transform .3s; }
  .sidebar.open { transform:translateX(0); }
  .side-panel { position:fixed; right:0; z-index:50; }
}

/* ── File input hidden ── */
#file-input { display:none; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-logo">Golden Boot</span>
  </div>

  <div class="sidebar-tabs">
    <button class="stab active" title="Chats privados" onclick="switchSideTab('private')">💬
      <span class="badge" id="badge-private"></span>
    </button>
    <button class="stab" title="Grupos" onclick="switchSideTab('groups')">👥</button>
    <button class="stab" title="Tareas" onclick="switchSideTab('tasks')">✅</button>
    <button class="stab" title="Recompensas" onclick="switchSideTab('rewards')">🏆</button>
  </div>

  <!-- Panel: Privados -->
  <div class="panel active" id="panel-private">
    <div class="search-box">
      <input type="text" placeholder="Buscar usuario..." id="search-users" oninput="filterUsers(this.value)">
    </div>
    <div class="list" id="users-list"></div>
  </div>

  <!-- Panel: Grupos -->
  <div class="panel" id="panel-groups">
    <button class="btn-add" onclick="openCreateGroup()">+ Crear grupo</button>
    <div class="list" id="groups-list"></div>
  </div>

  <!-- Panel: Tareas (sidebar) -->
  <div class="panel" id="panel-tasks">
    <div style="padding:1rem;color:var(--muted);font-size:.85rem">
      Selecciona un grupo para ver sus tareas.
    </div>
  </div>

  <!-- Panel: Recompensas sidebar -->
  <div class="panel" id="panel-rewards">
    <div class="list" id="rewards-sidebar-list" style="padding:.75rem"></div>
  </div>

  <div class="sidebar-footer">
    <div class="avatar" id="my-avatar">?</div>
    <div class="my-info">
      <div class="my-name" id="my-name">—</div>
      <div class="my-points" id="my-points">0 pts ✨</div>
    </div>
    <button class="btn-icon" title="Cerrar sesión" onclick="logout()">🚪</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- Empty state -->
  <div class="empty-state" id="empty-state">
    <span>💬</span>
    <h2>Selecciona un chat</h2>
    <p>Elige un usuario o grupo para comenzar a chatear.</p>
  </div>

  <!-- Chat area (oculta al inicio) -->
  <div id="chat-area" style="display:none;flex-direction:column;height:100%;">
    <div class="chat-header">
      <div class="avatar" id="chat-avatar" style="width:38px;height:38px;font-size:.95rem">?</div>
      <div>
        <div class="chat-title" id="chat-title">—</div>
        <div class="chat-sub" id="chat-sub">offline</div>
      </div>
      <div class="header-actions">
        <button class="btn-action" id="btn-videocall" onclick="startCall()" title="Videollamada" style="display:none">Llamar</button>
        <button class="btn-action" onclick="toggleTaskPanel()">Tareas</button>
        <button class="btn-action" onclick="toggleLeaderboard()">Ranking</button>
        <button class="btn-action" onclick="shareLocation()">Ubicación</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-toolbar">
        <button class="tool-btn" title="Adjuntar archivo" onclick="document.getElementById('file-input').click()">📎</button>
        <button class="tool-btn" title="Imagen" onclick="document.getElementById('file-input').click()">🖼️</button>
        <label class="encrypt-toggle">
          <input type="checkbox" id="encrypt-toggle"> Cifrar 🔒
        </label>
      </div>
      <div class="input-row">
        <textarea class="msg-input" id="msg-input"
          placeholder="Escribe un mensaje..."
          rows="1"
          onkeydown="handleMsgKey(event)"
          oninput="autoResize(this);sendTyping()"></textarea>
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</main>

<!-- SIDE PANEL: Tareas -->
<aside class="side-panel" id="task-panel">
  <div class="panel-header">
    <span class="panel-title">Tareas del grupo</span>
    <button class="btn-icon" onclick="toggleTaskPanel()">✕</button>
  </div>
  <div style="padding:1rem;border-bottom:1px solid var(--border)">
    <button class="btn-add" style="margin:0;width:100%" onclick="openCreateTask()">+ Nueva tarea</button>
  </div>
  <div class="panel-body" id="tasks-list"></div>
</aside>

<!-- SIDE PANEL: Leaderboard -->
<aside class="side-panel" id="leaderboard-panel">
  <div class="panel-header">
    <span class="panel-title">Ranking Global</span>
    <button class="btn-icon" onclick="toggleLeaderboard()">✕</button>
  </div>
  <div class="panel-body" id="leaderboard-list"></div>
</aside>

<!-- MODAL: Crear grupo -->
<div class="modal-overlay" id="modal-group">
  <div class="modal">
    <h3>Crear grupo</h3>
    <input type="text" id="group-name" placeholder="Nombre del grupo">
    <textarea id="group-desc" placeholder="Descripción (opcional)"></textarea>
    <label style="font-size:.82rem;color:var(--muted)">Agregar miembros:</label>
    <div class="users-list-check" id="group-users-check"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal('modal-group')">Cancelar</button>
      <button class="btn-modal-ok" onclick="createGroup()">Crear</button>
    </div>
  </div>
</div>

<!-- MODAL: Crear tarea -->
<div class="modal-overlay" id="modal-task">
  <div class="modal">
    <h3>Nueva tarea</h3>
    <input type="text" id="task-title" placeholder="Título de la tarea">
    <textarea id="task-desc" placeholder="Descripción (opcional)"></textarea>

<!--  VIDEOLLAMADA -->
<div class="call-overlay" id="call-overlay">
  <div class="video-grid">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video"  autoplay playsinline muted></video>
  </div>
  <div class="call-controls">
    <button class="call-btn mute" id="btn-mute"  onclick="toggleMute()">🎤</button>

       onchange="handleFileUpload(this)">

<!-- Toast container -->
<div id="toast-container"></div>

<script>

//   GOLDEN BOOT - Frontend App - PENDING 

const API_BASE = window.location.origin + '/Progra_Orientada_Internet/backend/api';
// Cambia el puerto si usas otro:
const WS_URL   = 'wss://mankind-lesser-unsigned.ngrok-free.dev';

// Estado 
let currentUser  = null;
let activeChat   = null;  // { type:'private'|'group', id, name }
let ws           = null;
let allUsers     = [];
let myGroups     = [];
let typingTimer  = null;

// WebRTC
let peerConn     = null;
let localStream  = null;
let incomingCall = null;

// INIT
(async () => {
  try {
    const res  = await apiFetch('/auth.php?action=me');
    currentUser = res.user;
    if (!currentUser) { window.location.href = 'index.html'; return; }
    initUI();
    connectWebSocket();
    loadAllUsers();
    loadMyGroups();
    loadLeaderboard();
    loadMyRewards();
  } catch {
    window.location.href = 'index.html';
  }
})();

function initUI() {
  document.getElementById('my-name').textContent   = currentUser.username;
  document.getElementById('my-points').textContent = currentUser.points + ' pts ✨';
  document.getElementById('my-avatar').textContent = currentUser.username[0].toUpperCase();
}

// API HELPER
async function apiFetch(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Error de servidor');
  return data;
}

// WEBSOCKET
function connectWebSocket() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    // Autenticar con session ID
    const sessionId = document.cookie.match(/PHPSESSID=([^;]+)/)?.[1] || '';
    wsSend({ type: 'auth', session_id: sessionId });
    console.log('[WS] Conectado');
  };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    handleWsMessage(msg);
  };

  ws.onclose = () => {
    console.warn('[WS] Desconectado, reconectando en 3s...');
    setTimeout(connectWebSocket, 3000);
  };

  ws.onerror = e => console.error('[WS] Error', e);
}

function wsSend(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

function handleWsMessage(msg) {
  switch (msg.type) {
    case 'auth_ok':
      toast('Conectado en tiempo real');
      break;

    case 'private_msg':
      if (activeChat?.type === 'private' && 
          (msg.sender_id == activeChat.id || msg.receiver_id == activeChat.id)) {
        appendMessage(msg, msg.sender_id == currentUser.id);
      } else if (msg.sender_id != currentUser.id) {
        showUnreadBadge('private');
        toast(`Mensaje de ${getUserName(msg.sender_id)}`);
      }
      break;

    case 'group_msg':
      if (activeChat?.type === 'group' && msg.group_id == activeChat.id) {
        appendMessage(msg, msg.sender_id == currentUser.id);
      } else {
        toast(`Mensaje en grupo #${msg.group_id}`);
      }
      break;

    case 'status_change':
      updateUserStatus(msg.userId, msg.status);
      break;

    case 'typing':
      if (activeChat?.type === 'private' && msg.sender_id == activeChat.id) {
        showTyping();
      }
      break;

    case 'location':
      if (activeChat && 
          (msg.sender_id == activeChat.id || 
           (activeChat.type === 'group'))) {
        appendLocationMessage(msg, msg.sender_id == currentUser.id);
      }
      break;

    // WebRTC
    case 'call_request':
      incomingCall = msg;
      document.getElementById('incoming-caller-name').textContent =
        `${getUserName(msg.from_id)} te llama`;
      openModal('modal-incoming-call');
      break;

    case 'call_accept':
      closeModal('modal-incoming-call');
      startWebRTC(false);
      break;

    case 'call_reject':
      toast('Llamada rechazada');
      closeModal('modal-incoming-call');
      break;

    case 'call_end':
      endCall();
      break;

    case 'webrtc_offer':
      handleOffer(msg.sdp);
      break;

    case 'webrtc_answer':
      handleAnswer(msg.sdp);
      break;

    case 'webrtc_ice':
      if (peerConn) peerConn.addIceCandidate(new RTCIceCandidate(msg.candidate));
      break;
  }
}

// USERS & GROUPS
async function loadAllUsers() {
  const data = await apiFetch('/groups.php?action=all_users');
  allUsers = data.users || [];
  renderUsersList(allUsers);
}

function renderUsersList(users) {
  const list = document.getElementById('users-list');
  list.innerHTML = users.map(u => `
    <div class="list-item" onclick="openPrivateChat(${u.id}, '${u.username}', '${u.status}')">
      <div class="avatar">
        ${u.username[0].toUpperCase()}
        <span class="status-dot ${u.status}"></span>
      </div>
      <div class="list-info">
        <div class="list-name">${u.username}</div>
        <div class="list-preview">${u.status}</div>
      </div>
    </div>
  `).join('');
}

function filterUsers(q) {
  const filtered = allUsers.filter(u => u.username.toLowerCase().includes(q.toLowerCase()));
  renderUsersList(filtered);
}

async function loadMyGroups() {
  const data = await apiFetch('/groups.php?action=list');
  myGroups = data.groups || [];
  renderGroupsList();
}

function renderGroupsList() {
  const list = document.getElementById('groups-list');
  list.innerHTML = myGroups.map(g => `
    <div class="list-item" onclick="openGroupChat(${g.id}, '${escHtml(g.name)}')">
      <div class="avatar">👥</div>
      <div class="list-info">
        <div class="list-name">${escHtml(g.name)}</div>
        <div class="list-preview">${g.member_count} miembros</div>
      </div>
    </div>
  `).join('');
}

function updateUserStatus(userId, status) {
  // Actualizar en la lista de usuarios
  const item = document.querySelector(`[onclick*="openPrivateChat(${userId},"]`);
  if (item) {
    const dot = item.querySelector('.status-dot');
    if (dot) { dot.className = `status-dot ${status}`; }
    const preview = item.querySelector('.list-preview');
    if (preview) preview.textContent = status;
  }
  // Actualizar header si estamos chateando con ese usuario
  if (activeChat?.type === 'private' && activeChat.id == userId) {
    document.getElementById('chat-sub').textContent = status;
  }
}

function getUserName(userId) {
  return allUsers.find(u => u.id == userId)?.username || `#${userId}`;
}

// ABRIR CHATS
async function openPrivateChat(userId, username, status) {
  activeChat = { type: 'private', id: userId, name: username };

  document.getElementById('empty-state').style.display = 'none';
  const chatArea = document.getElementById('chat-area');
  chatArea.style.display = 'flex';

  document.getElementById('chat-avatar').textContent = username[0].toUpperCase();
  document.getElementById('chat-title').textContent  = username;
  document.getElementById('chat-sub').textContent    = status || 'offline';
  document.getElementById('btn-videocall').style.display = 'flex';

  // Marcar items activos
  document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
  event?.currentTarget?.classList.add('active');

  // Cargar historial
  const data = await apiFetch(`/messages.php?action=history&receiver_id=${userId}`);
  renderMessages(data.messages || []);

  // Marcar leídos
  await apiFetch('/messages.php?action=mark_read', {
    method: 'POST',
    body: JSON.stringify({ sender_id: userId }),
  });
}

async function openGroupChat(groupId, groupName) {
  activeChat = { type: 'group', id: groupId, name: groupName };

  document.getElementById('empty-state').style.display = 'none';
  const chatArea = document.getElementById('chat-area');
  chatArea.style.display = 'flex';

  document.getElementById('chat-avatar').textContent = '👥';
  document.getElementById('chat-title').textContent  = groupName;
  document.getElementById('chat-sub').textContent    = 'grupo';
  document.getElementById('btn-videocall').style.display = 'none';

  document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
  event?.currentTarget?.classList.add('active');

  const data = await apiFetch(`/messages.php?action=history&group_id=${groupId}`);
  renderMessages(data.messages || []);

  loadTasks(groupId);
}

// MENSAJES
function renderMessages(messages) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  messages.forEach(m => appendMessage(m, m.sender_id == currentUser.id));
}

function appendMessage(msg, isMine) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg-wrapper ${isMine ? 'mine' : 'theirs'}`;

  let contentHtml = '';
  if (msg.file_type === 'image' && msg.file_path) {
    contentHtml = `<div class="msg-file"><img src="/Progra_Orientada_Internet/frontend/uploads/${msg.file_path}" onclick="window.open(this.src)"></div>`;
  } else if (msg.file_type === 'audio' && msg.file_path) {
    contentHtml = `<div class="msg-file"><audio controls src="/Progra_Orientada_Internet/frontend/uploads/${msg.file_path}"></audio></div>`;
  } else if (msg.file_type === 'location') {
    contentHtml = `<div class="msg-location">📍 <a href="${escHtml(msg.content)}" target="_blank">Ver ubicación en Maps</a></div>`;
  } else {
    const text = msg.is_encrypted ? `🔒 ${atob(msg.content || '')}` : escHtml(msg.content || '');
    contentHtml = text;
  }

  div.innerHTML = `
    ${!isMine ? `<div class="msg-avatar">${(msg.username||'?')[0].toUpperCase()}</div>` : ''}
    <div>
      ${!isMine ? `<div class="msg-sender">${escHtml(msg.username||'')}</div>` : ''}
      <div class="msg-bubble">
        ${contentHtml}
        ${msg.is_encrypted ? '<span class="encrypted-badge">🔒</span>' : ''}
      </div>
      <div class="msg-meta">
        <span>${formatTime(msg.created_at)}</span>
        ${isMine && msg.is_read ? '<span>✓✓</span>' : ''}
      </div>
    </div>
  `;

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function appendLocationMessage(msg, isMine) {
  appendMessage({ ...msg, content: msg.maps_url, file_type: 'location' }, isMine);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !activeChat) return;

  const encrypted = document.getElementById('encrypt-toggle').checked;
  const finalContent = encrypted ? btoa(content) : content;

  const body = {
    content: finalContent,
    encrypted: encrypted ? 1 : 0,
  };
  if (activeChat.type === 'private') body.receiver_id = activeChat.id;
  else body.group_id = activeChat.id;

  // Enviar por WebSocket (tiempo real)
  wsSend({
    type: activeChat.type === 'private' ? 'private_msg' : 'group_msg',
    ...body,
    receiver_id: activeChat.type === 'private' ? activeChat.id : undefined,
    group_id:    activeChat.type === 'group'   ? activeChat.id : undefined,
  });

  // También guardamos en BD via HTTP (redundancia)
  await apiFetch('/messages.php?action=send', {
    method: 'POST',
    body: JSON.stringify(body),
  }).catch(() => {});

  input.value = '';
  autoResize(input);
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendTyping() {
  if (!activeChat || activeChat.type !== 'private') return;
  wsSend({ type: 'typing', target_id: activeChat.id });
}

function showTyping() {
  let el = document.getElementById('typing-indicator');
  if (!el) {
    el = document.createElement('div');
    el.id = 'typing-indicator';
    el.className = 'typing-indicator';
    el.textContent = '... escribiendo';
    document.getElementById('messages').appendChild(el);
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => el?.remove(), 2000);
}

// ARCHIVOS
async function handleFileUpload(input) {
  if (!input.files[0] || !activeChat) return;
  const file = input.files[0];
  const form = new FormData();
  form.append('file', file);
  if (activeChat.type === 'private') form.append('receiver_id', activeChat.id);
  else form.append('group_id', activeChat.id);

  try {
    const res  = await fetch(`${API_BASE}/messages.php?action=upload`, {
      method: 'POST', credentials: 'include', body: form,
    });
    const data = await res.json();
    toast('Archivo enviado');
    // Recargar mensajes
    const msgs = await apiFetch(
      activeChat.type === 'private'
        ? `/messages.php?action=history&receiver_id=${activeChat.id}`
        : `/messages.php?action=history&group_id=${activeChat.id}`
    );
    renderMessages(msgs.messages || []);
  } catch (e) {
    toast('Error subiendo archivo', true);
  }
  input.value = '';
}

// UBICACIÓN
function shareLocation() {
  if (!activeChat) return;
  navigator.geolocation.getCurrentPosition(pos => {
    wsSend({
      type:        'location',
      lat:         pos.coords.latitude,
      lng:         pos.coords.longitude,
      receiver_id: activeChat.type === 'private' ? activeChat.id : undefined,
      group_id:    activeChat.type === 'group'   ? activeChat.id : undefined,
    });
    toast('Ubicación compartida');
  }, () => toast('No se pudo obtener ubicación', true));
}

// GRUPOS
function openCreateGroup() {
  // Llenar lista de usuarios
  const cont = document.getElementById('group-users-check');
  cont.innerHTML = allUsers.map(u => `
    <label class="user-check-item">
      <input type="checkbox" value="${u.id}">
      <span>${u.username}</span>
    </label>
  `).join('');
  openModal('modal-group');
}

async function createGroup() {
  const name    = document.getElementById('group-name').value.trim();
  const desc    = document.getElementById('group-desc').value.trim();
  const members = [...document.querySelectorAll('#group-users-check input:checked')]
                    .map(cb => parseInt(cb.value));

  if (!name) { toast('Ingresa un nombre', true); return; }
  if (members.length < 2) { toast('Agrega al menos 2 miembros (mínimo 3 en total)', true); return; }

  await apiFetch('/groups.php?action=create', {
    method: 'POST',
    body: JSON.stringify({ name, description: desc, members }),
  });

  toast('👥 Grupo creado');
  closeModal('modal-group');
  loadMyGroups();
  document.getElementById('group-name').value = '';
  document.getElementById('group-desc').value = '';
}

// TAREAS
async function loadTasks(groupId) {
  const data  = await apiFetch(`/tasks.php?action=list&group_id=${groupId}`);
  const tasks = data.tasks || [];
  const list  = document.getElementById('tasks-list');

  list.innerHTML = tasks.length ? tasks.map(t => `
    <div class="task-card">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        ${t.assigned_to_name ? `👤 ${escHtml(t.assigned_to_name)}` : ''}
        ${t.due_date ? ` · 📅 ${t.due_date}` : ''}
      </div>
      <span class="task-status status-${t.status}">${
        t.status === 'done' ? 'Completada' :
        t.status === 'in_progress' ? 'En progreso' : 'Pendiente'
      }</span>
      ${t.status !== 'done' ? `<br><button class="btn-complete" onclick="completeTask(${t.id})">Marcar como terminada</button>` : ''}
    </div>
  `).join('') : '<p style="color:var(--muted);font-size:.85rem">No hay tareas aún.</p>';
}

function openCreateTask() {
  if (!activeChat || activeChat.type !== 'group') {
    toast('Selecciona un grupo primero', true); return;
  }
  // Llenar selector de usuarios
  apiFetch(`/groups.php?action=members&group_id=${activeChat.id}`).then(data => {
    const sel = document.getElementById('task-assign');
    sel.innerHTML = '<option value="">Sin asignar</option>' +
      (data.members || []).map(m =>
        `<option value="${m.id}">${escHtml(m.username)}</option>`
      ).join('');
  });
  openModal('modal-task');
}

async function createTask() {
  const title  = document.getElementById('task-title').value.trim();
  const desc   = document.getElementById('task-desc').value.trim();
  const assign = document.getElementById('task-assign').value;
  const due    = document.getElementById('task-due').value;

  if (!title) { toast('Título requerido', true); return; }

  await apiFetch('/tasks.php?action=create', {
    method: 'POST',
    body: JSON.stringify({
      group_id:    activeChat.id,
      title, description: desc,
      assigned_to: assign || null,
      due_date:    due || null,
    }),
  });

  toast('Tarea creada');
  closeModal('modal-task');
  document.getElementById('task-title').value = '';
  document.getElementById('task-desc').value  = '';
  loadTasks(activeChat.id);
}

async function completeTask(taskId) {
  await apiFetch('/tasks.php?action=complete', {
    method: 'POST',
    body: JSON.stringify({ task_id: taskId }),
  });
  toast('¡Tarea completada! +20 pts');
  loadTasks(activeChat.id);
  // Actualizar puntos
  const me = await apiFetch('/auth.php?action=me');
  currentUser = me.user;
  document.getElementById('my-points').textContent = currentUser.points + ' pts ✨';
}

// ══ RECOMPENSAS ═══════════════════════════════════════════════
async function loadLeaderboard() {
  const data = await apiFetch('/rewards.php?action=leaderboard');
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = (data.leaderboard || []).map((u, i) => `
    <div class="leader-row">
      <span class="leader-rank ${i<3?'gold-rank':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
      <div class="avatar" style="width:32px;height:32px;font-size:.8rem">${u.username[0].toUpperCase()}</div>
      <div>
        <div style="font-size:.88rem;font-weight:600">${escHtml(u.username)}</div>
        <div style="font-size:.72rem;color:var(--muted)">${u.badge_count} badges</div>
      </div>
      <span class="leader-pts">${u.points} pts</span>
    </div>
  `).join('');
}

async function loadMyRewards() {
  const data = await apiFetch('/rewards.php?action=my_rewards');
  const list = document.getElementById('rewards-sidebar-list');
  list.innerHTML = (data.rewards || []).map(r => `
    <div class="reward-card">
      <span class="reward-icon">${r.icon}</span>
      <div class="reward-info">
        <div class="reward-name">${escHtml(r.name)}</div>
        <div class="reward-desc">${escHtml(r.description)}</div>
      </div>
      <span class="reward-earned">✓</span>
    </div>
  `).join('') || '<p style="color:var(--muted);font-size:.85rem">Aún no tienes recompensas.</p>';
}

// VIDEOLLAMADA (WebRTC)
async function startCall() {
  if (!activeChat || activeChat.type !== 'private') return;
  wsSend({ type: 'call_request', target_id: activeChat.id });
  toast('Llamando...');
  await startWebRTC(true);
}

async function startWebRTC(isInitiator) {
  const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
  peerConn = new RTCPeerConnection(config);

  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById('local-video').srcObject = localStream;
  localStream.getTracks().forEach(t => peerConn.addTrack(t, localStream));

  peerConn.onicecandidate = e => {
    if (e.candidate) {
      wsSend({ type:'webrtc_ice', target_id: activeChat.id, candidate: e.candidate });
    }
  };

  peerConn.ontrack = e => {
    document.getElementById('remote-video').srcObject = e.streams[0];
  };

  document.getElementById('call-overlay').classList.add('open');

  if (isInitiator) {
    const offer = await peerConn.createOffer();
    await peerConn.setLocalDescription(offer);
    wsSend({ type:'webrtc_offer', target_id: activeChat.id, sdp: offer });
  }
}

async function handleOffer(sdp) {
  if (!peerConn) return;
  await peerConn.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer = await peerConn.createAnswer();
  await peerConn.setLocalDescription(answer);
  wsSend({ type:'webrtc_answer', target_id: incomingCall?.from_id || activeChat.id, sdp: answer });
}

async function handleAnswer(sdp) {
  if (peerConn) await peerConn.setRemoteDescription(new RTCSessionDescription(sdp));
}

function acceptCall() {
  closeModal('modal-incoming-call');
  activeChat = { type:'private', id: incomingCall.from_id, name: getUserName(incomingCall.from_id) };
  wsSend({ type:'call_accept', target_id: incomingCall.from_id });
  startWebRTC(false);
}

function rejectCall() {
  wsSend({ type:'call_reject', target_id: incomingCall?.from_id });
  closeModal('modal-incoming-call');
  incomingCall = null;
}

function endCall() {
  wsSend({ type:'call_end', target_id: activeChat?.id });
  localStream?.getTracks().forEach(t => t.stop());
  peerConn?.close();
  peerConn = null; localStream = null;
  document.getElementById('call-overlay').classList.remove('open');
  document.getElementById('local-video').srcObject  = null;
  document.getElementById('remote-video').srcObject = null;
}

function toggleMute() {
  if (!localStream) return;
  localStream.getAudioTracks().forEach(t => t.enabled = !t.enabled);
  document.getElementById('btn-mute').textContent = localStream.getAudioTracks()[0]?.enabled ? '🎤' : '🔇';
}

function toggleCam() {
  if (!localStream) return;
  localStream.getVideoTracks().forEach(t => t.enabled = !t.enabled);
  document.getElementById('btn-cam').textContent = localStream.getVideoTracks()[0]?.enabled ? '📷' : '📵';
}

// UI HELPERS
function switchSideTab(tab) {
  document.querySelectorAll('.stab').forEach((b, i) => {
    const tabs = ['private','groups','tasks','rewards'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
}

function toggleTaskPanel() {
  document.getElementById('task-panel').classList.toggle('open');
  document.getElementById('leaderboard-panel').classList.remove('open');
}

function toggleLeaderboard() {
  document.getElementById('leaderboard-panel').classList.toggle('open');
  document.getElementById('task-panel').classList.remove('open');
  loadLeaderboard();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toast(msg, isError = false) {
  const el = document.createElement('div');
  el.className = 'toast';
  if (isError) el.style.borderLeftColor = 'var(--red)';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function showUnreadBadge(panel) {
  const badge = document.getElementById(`badge-${panel}`);
  if (badge) { badge.classList.add('show'); badge.textContent = '•'; }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function logout() {
  await apiFetch('/auth.php?action=logout', { method: 'POST' }).catch(() => {});
  localStorage.removeItem('gb_user');
  window.location.href = 'index.html';
}

// Cerrar modales con Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
});
</script>
