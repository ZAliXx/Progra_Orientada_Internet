<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Boot — Conecta. Comunica. Logra.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Syne:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="indexstyle.css">
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<div class="auth-wrapper">
  <div class="logo">
    <i class="fas fa-trophy" style="font-size: 3rem; color: var(--gold); display: block; margin-bottom: 1rem;"></i>
    <h1>Golden Boot</h1>
    <p>Conecta. Comunica. Logra.</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</button>
      <button class="tab" onclick="switchTab('register')"><i class="fas fa-user-plus"></i> Registrarse</button>
    </div>

    <div class="alert" id="alert"></div>

    <!-- Login -->
    <div id="form-login" class="form">
      <div class="field">
        <label><i class="fas fa-envelope"></i> Correo electrónico</label>
        <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email">
      </div>
      <div class="field">
        <label><i class="fas fa-lock"></i> Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="handleLogin()"><i class="fas fa-arrow-right"></i> Entrar</button>
    </div>

    <!-- Registro -->
    <div id="form-register" class="form" style="display:none">
      <div class="field">
        <label><i class="fas fa-user"></i> Nombre de usuario</label>
        <input type="text" id="reg-username" placeholder="golden_user" autocomplete="username">
      </div>
      <div class="field">
        <label><i class="fas fa-envelope"></i> Correo electrónico</label>
        <input type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email">
      </div>
      <div class="field">
        <label><i class="fas fa-lock"></i> Contraseña</label>
        <input type="password" id="reg-password" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="handleRegister()"><i class="fas fa-user-check"></i> Crear cuenta</button>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin + '/Progra_Orientada_Internet/backend/api';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  document.getElementById('form-login').style.display    = tab === 'login'    ? 'flex' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
  hideAlert();
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert');
  el.innerHTML = msg;
  el.className   = `alert ${type} show`;
}
function hideAlert() {
  document.getElementById('alert').className = 'alert';
}
function setLoading(btn, loading) {
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span>Cargando...'
    : btn.dataset.label;
}

async function handleLogin() {
  const btn = document.querySelector('#form-login .btn-primary');
  btn.dataset.label = btn.innerHTML;
  setLoading(btn, true);
  hideAlert();

  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  try {
    const res  = await fetch(`${API_BASE}/auth.php?action=login`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');

    localStorage.setItem('gb_user', JSON.stringify(data.user));
    showAlert('<i class="fas fa-check-circle"></i> ¡Bienvenido! Redirigiendo...', 'success');
    setTimeout(() => window.location.href = 'chat.html', 800);
  } catch (e) {
    showAlert(`<i class="fas fa-exclamation-triangle"></i> ${e.message}`);
  } finally {
    setLoading(btn, false);
  }
}

async function handleRegister() {
  const btn = document.querySelector('#form-register .btn-primary');
  btn.dataset.label = btn.innerHTML;
  setLoading(btn, true);
  hideAlert();

  const username = document.getElementById('reg-username').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  try {
    const res  = await fetch(`${API_BASE}/auth.php?action=register`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al registrarse');

    localStorage.setItem('gb_user', JSON.stringify(data.user));
    showAlert('<i class="fas fa-check-circle"></i> ¡Cuenta creada! Redirigiendo...', 'success');
    setTimeout(() => window.location.href = 'chat.html', 800);
  } catch (e) {
    showAlert(`<i class="fas fa-exclamation-triangle"></i> ${e.message}`);
  } finally {
    setLoading(btn, false);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginVisible = document.getElementById('form-login').style.display !== 'none';
    loginVisible ? handleLogin() : handleRegister();
  }
});

(async () => {
  try {
    const res = await fetch(`${API_BASE}/auth.php?action=me`, { credentials: 'include' });
    if (res.ok) window.location.href = 'chat.html';
  } catch {}
})();
</script>
</body>
</html>
